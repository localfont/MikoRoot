#
# Unbound configuration file for MikoOS runtime test.
#

server:
	do-ip6: no
	local-zone: "test." nodefault
	local-zone: "10.in-addr.arpa." nodefault
	private-domain: "mikoos.test"
	local-zone: "mikoos.test" static
	local-data: "somehost.mikoos.test. IN A 10.20.30.40"
	local-data: 'sometext.mikoos.test. TXT "Hello MikoOS TXT"'
	local-data-ptr: "10.20.30.40 somehost.mikoos.test"

remote-control:
	control-enable: yes
	control-use-cert: no
