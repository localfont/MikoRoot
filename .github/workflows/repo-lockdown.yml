name: 'Repo Lockdown'

on:
  pull_request_target:
    types: opened

permissions:
  pull-requests: write

jobs:
  action:
    if: github.repository == 'mikoos/mikoos'
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/repo-lockdown@v4
        with:
          pr-comment: |
            Please do not submit a Pull Request via GitHub. MikoOS makes use of a
            [mailing list](http://lists.mikoos.org/mailman/listinfo/mikoos) for patch submission and review.
            See [submitting your own patches](http://mikoos.org/manual.html#submitting-patches) for more info.

            Thanks for your help!
          lock-pr: true
          close-pr: true

